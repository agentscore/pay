name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Publish to npm (with provenance)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            echo "prerelease detected — publishing under dist-tag: $DIST_TAG"
            npm publish --access public --provenance --tag "$DIST_TAG"
          else
            npm publish --access public --provenance
          fi

      - name: Build native binaries
        run: bun run build:binary:all

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign native binaries with cosign (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          for f in dist/bin/agentscore-pay-*; do
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes \
            dist/bin/agentscore-pay-darwin-arm64 \
            dist/bin/agentscore-pay-darwin-arm64.sig \
            dist/bin/agentscore-pay-darwin-arm64.pem \
            dist/bin/agentscore-pay-darwin-x64 \
            dist/bin/agentscore-pay-darwin-x64.sig \
            dist/bin/agentscore-pay-darwin-x64.pem \
            dist/bin/agentscore-pay-linux-arm64 \
            dist/bin/agentscore-pay-linux-arm64.sig \
            dist/bin/agentscore-pay-linux-arm64.pem \
            dist/bin/agentscore-pay-linux-x64 \
            dist/bin/agentscore-pay-linux-x64.sig \
            dist/bin/agentscore-pay-linux-x64.pem \
            dist/bin/agentscore-pay-windows-x64.exe \
            dist/bin/agentscore-pay-windows-x64.exe.sig \
            dist/bin/agentscore-pay-windows-x64.exe.pem
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        if: env.GH_TOKEN != ''
        run: |
          set -euo pipefail
          VERSION_NO_V="${VERSION#v}"
          TARBALL_URL="https://registry.npmjs.org/@agent-score/pay/-/pay-${VERSION_NO_V}.tgz"
          # npm CDN can take several minutes to propagate a new tarball; poll up to 5 min.
          for i in $(seq 1 30); do
            if curl -fsSI "$TARBALL_URL" >/dev/null 2>&1; then
              echo "tarball reachable after ${i}0s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "tarball never became reachable in 5 minutes — aborting" >&2
              exit 1
            fi
            sleep 10
          done
          # Download once + checksum the file (separate steps so a partial download fails)
          curl -fsSL "$TARBALL_URL" -o /tmp/pay.tgz
          test -s /tmp/pay.tgz || { echo "downloaded tarball is empty" >&2; exit 1; }
          SHA256=$(shasum -a 256 /tmp/pay.tgz | awk '{print $1}')
          echo "tarball: $TARBALL_URL"
          echo "sha256:  $SHA256"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/agentscore/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula
          # template has literal ${URL} / ${SHA} tokens; sed substitutes them.
          # Escape the literal $ in the search pattern via single-quoted shell + \$.
          sed -e 's|\${URL}|'"$TARBALL_URL"'|g' \
              -e 's|\${SHA}|'"$SHA256"'|g' \
              ../Formula/agentscore-pay.rb.template > Formula/agentscore-pay.rb
          git config user.name 'agentscore-bot'
          git config user.email 'bot@agentscore.sh'
          git add Formula/agentscore-pay.rb
          git commit -m "agentscore-pay $VERSION" || echo "no changes"
          git push origin HEAD
