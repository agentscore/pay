name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Build native binaries
        run: bun run build:binary:all

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes \
            dist/bin/agentscore-pay-darwin-arm64 \
            dist/bin/agentscore-pay-darwin-x64 \
            dist/bin/agentscore-pay-linux-arm64 \
            dist/bin/agentscore-pay-linux-x64 \
            dist/bin/agentscore-pay-windows-x64.exe
        env:
          GH_TOKEN: ${{ github.token }}
